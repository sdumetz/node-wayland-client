name: Test
on:
  push:
  pull_request:
concurrency: 
  group: build-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    name: run tests
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: npm
      - name: install
        run: npm ci
      - name: build
        run: npm run build
      - name: test
        run: npm test
